<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>Aula Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4f8;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      width: 1024px;
      height: 600px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #005fa8;
      border-radius: 10px;
      padding: 8px 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; color: #fff; font-weight: 700; }
    header #clock { font-size: 1rem; color: #cce4f7; }

    #session-banner {
      display: none;
      background: #d9534f;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      color: #fff;
      flex-shrink: 0;
      overflow: visible;
      height: auto;
      min-height: 44px;
    }
    #session-banner:hover { background: #c9302c; }

    .main {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .tab {
      padding: 6px 20px;
      border-radius: 8px;
      background: #fff;
      color: #005fa8;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      border: 2px solid #d0e4f0;
      transition: all 0.2s;
    }
    .tab.active {
      background: #005fa8;
      color: #fff;
      border-color: #005fa8;
    }

    /* Week view */
    .week-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      border: 1px solid #d0e4f0;
    }
    .week-card h2 {
      font-size: 0.85rem;
      color: #005fa8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .day-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #e8f0f7;
      align-items: start;
    }
    .day-row:last-child { border-bottom: none; }
    .day-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
      padding-top: 2px;
    }
    .day-row.today .day-name { color: #005fa8; }
    .day-row.today {
      background: #e8f4fc;
      border-radius: 6px;
      padding: 5px 6px;
      margin: 0 -6px;
    }
    .events { display: flex; flex-direction: column; gap: 3px; }
    .event {
      font-size: 0.8rem;
      background: #e8f4fc;
      border-left: 3px solid #0093d0;
      border-radius: 4px;
      padding: 3px 7px;
      display: flex;
      justify-content: space-between;
      color: #333;
    }
    .day-row.today .event {
      background: #cce4f7;
      border-left-color: #005fa8;
    }
    .event .time { color: #005fa8; font-size: 0.75rem; white-space: nowrap; margin-left: 8px; font-weight: 600; }
    .no-events { font-size: 0.78rem; color: #bbb; font-style: italic; }

    /* Messages */
    .messages-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      overflow-y: auto;
      border: 1px solid #d0e4f0;
    }
    .messages-card h2 {
      font-size: 0.85rem;
      color: #005fa8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .msg-item {
      padding: 8px 0;
      border-bottom: 1px solid #e8f0f7;
      font-size: 0.82rem;
    }
    .msg-item:last-child { border-bottom: none; }
    .msg-item .subject { font-weight: 600; color: #333; }
    .msg-item.unread .subject { color: #005fa8; }
    .msg-item.unread { border-left: 3px solid #005fa8; padding-left: 8px; }
    .msg-item .meta { color: #999; font-size: 0.75rem; margin-top: 3px; }
    .loading { color: #bbb; font-style: italic; font-size: 0.82rem; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Aula</h1>
    <div id="clock"></div>
  </header>

  <div id="session-banner" onclick="startLogin()">
    <b>⚠️ Session udløbet</b> — <span id="banner-msg">Klik for at logge ind automatisk</span>
  </div>

  <div class="main">
    <div class="left">
      <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Aksel</div>
        <div class="tab" onclick="switchTab(1)">Max</div>
      </div>
      <div class="week-card">
        <h2 id="week-title">Uge <span id="week-nr"></span></h2>
        <div id="week-content" class="loading">Henter...</div>
      </div>
    </div>
    <div class="messages-card">
      <h2>📬 Beskeder</h2>
      <div id="messages" class="loading">Henter...</div>
    </div>
  </div>

  <script>
    let API_KEY = '';
    const CHILDREN = [
      { name: 'Aksel', id: 5620584 },
      { name: 'Max',   id: 5620590 }
    ];
    let activeTab = 0;
    let allEvents = [];

    async function initConfig() {
      const res = await fetch('/api/config');
      const data = await res.json();
      API_KEY = data.api_key || '';
    }

    function apiFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: { ...(options.headers || {}), 'x-api-key': API_KEY }
      });
    }

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('da-DK', {weekday:'long', day:'numeric', month:'long'}) +
        '  ' + now.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Week helpers
    function getWeekDays() {
      const now = new Date();
      const day = now.getDay() || 7; // Mon=1
      const mon = new Date(now);
      mon.setDate(now.getDate() - day + 1);
      const days = [];
      for (let i = 0; i < 5; i++) {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function getWeekNr(date) {
      const d = new Date(date);
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      return 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
    }

    function isSameDay(a, b) {
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function switchTab(idx) {
      activeTab = idx;
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
      renderWeek();
    }

    function renderWeek() {
      const child = CHILDREN[activeTab];
      const days = getWeekDays();
      const today = new Date();
      document.getElementById('week-nr').textContent = getWeekNr(today);

      const content = document.getElementById('week-content');
      const dayNames = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag'];

      content.innerHTML = days.map((day, i) => {
        const isToday = isSameDay(day, today);
        const dayEvents = allEvents.filter(e => {
          if (!e.startDateTime) return false;
          const profiles = e.belongsToProfiles || [];
          if (!profiles.includes(child.id)) return false;
          return isSameDay(new Date(e.startDateTime), day);
        });

        const eventsHtml = dayEvents.length
          ? dayEvents.map(e => {
              const start = new Date(e.startDateTime);
              const end = e.endDateTime ? new Date(e.endDateTime) : null;
              const timeStr = start.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'}) +
                (end ? '–' + end.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'}) : '');
              const isAllDay = start.getHours()===0 && start.getMinutes()===0 && (!end || (end.getHours()===0 && end.getMinutes()===0));
              return `<div class="event">
                <span>${e.title || '(ingen titel)'}</span>
                ${!isAllDay ? `<span class="time">${timeStr}</span>` : ''}
              </div>`;
            }).join('')
          : '<div class="no-events">Ingen aktiviteter</div>';

        return `<div class="day-row ${isToday ? 'today' : ''}">
          <div class="day-name">${dayNames[i]}</div>
          <div class="events">${eventsHtml}</div>
        </div>`;
      }).join('');
    }

    // Login via Playwright
    let loginPolling = null;

    async function startLogin() {
      const msg = document.getElementById('banner-msg');
      msg.textContent = 'Starter login...';
      try {
        await apiFetch('/api/login/start', { method: 'POST' });
        msg.textContent = '📱 Godkend i MitID-appen på din telefon...';
        pollLoginStatus();
      } catch(e) {
        msg.textContent = 'Fejl: ' + e.message;
      }
    }

    function pollLoginStatus() {
      clearInterval(loginPolling);
      loginPolling = setInterval(async () => {
        const res = await apiFetch('/api/login/status');
        const data = await res.json();
        const banner = document.getElementById('session-banner');
        const msg = document.getElementById('banner-msg');
        if (data.state === 'show_qr') {
          banner.style.display = 'block';
          msg.innerHTML = '<b>📷 Scan QR-koden med din MitID-app</b><br/><img style="display:block;width:300px;margin-top:6px;border-radius:8px;border:2px solid #fff;" src="data:image/png;base64,' + data.qr_image + '"/>';
        } else if (data.state === 'success') {
          clearInterval(loginPolling);
          msg.textContent = '✅ Login lykkedes! Genindlæser...';
          setTimeout(() => window.location.reload(), 1000);
        } else if (data.state === 'failed') {
          clearInterval(loginPolling);
          msg.textContent = '❌ ' + (data.error || 'Login fejlede') + ' — Klik for at prøve igen';
        }
      }, 3000);
    }

    // Session check
    async function checkSession() {
      const res = await apiFetch('/api/status');
      const data = await res.json();
      document.getElementById('session-banner').style.display = data.session_valid ? 'none' : 'block';
      return data.session_valid;
    }

    async function loadCalendar() {
      const ids = CHILDREN.map(c => c.id).join(',');
      try {
        const res = await apiFetch('/api/calendar?inst_profile_ids=' + ids);
        if (res.status === 401) return;
        allEvents = await res.json();
        renderWeek();
      } catch(e) {
        document.getElementById('week-content').textContent = 'Fejl: ' + e.message;
      }
    }

    async function loadMessages() {
      const el = document.getElementById('messages');
      try {
        const res = await apiFetch('/api/messages');
        if (res.status === 401) { el.textContent = 'Session udløbet'; return; }
        const threads = await res.json();
        if (!threads.length) { el.textContent = 'Ingen beskeder'; return; }
        el.innerHTML = threads.slice(0, 2).map(t => `
          <div class="msg-item ${t.read ? '' : 'unread'}">
            <div class="subject">${t.subject || '(ingen emne)'}</div>
            <div class="meta">${t.read ? '✓ Læst' : '● Ulæst'}</div>
          </div>`).join('');
      } catch(e) { el.textContent = 'Fejl: ' + e.message; }
    }

    let pollTimer = null;
    let sessionWasExpired = false;

    async function loadAll() {
      await initConfig();
      const valid = await checkSession();
      if (valid) {
        if (sessionWasExpired) { window.location.reload(); return; }
        loadCalendar();
        loadMessages();
        schedulePoll(5 * 60 * 1000);
      } else {
        sessionWasExpired = true;
        schedulePoll(10 * 1000);
      }
    }

    function schedulePoll(ms) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(loadAll, ms);
    }

    loadAll();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>Aula Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      width: 1024px;
      height: 600px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16213e;
      border-radius: 10px;
      padding: 10px 16px;
    }
    header h1 { font-size: 1.3rem; color: #e94560; }
    header #clock { font-size: 1.1rem; color: #aaa; }
    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 14px;
      overflow-y: auto;
    }
    .card h2 { font-size: 0.95rem; color: #e94560; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .item { padding: 6px 0; border-bottom: 1px solid #0f3460; font-size: 0.85rem; }
    .item:last-child { border-bottom: none; }
    .item .title { font-weight: 600; }
    .item .meta { color: #888; font-size: 0.75rem; margin-top: 2px; }
    .unread .title { color: #e94560; }
    .loading { color: #555; font-style: italic; font-size: 0.85rem; }
    #session-banner {
      display: none;
      grid-column: 1 / -1;
      background: #e94560;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    #session-banner:hover { background: #c73652; }
    #session-banner b { font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Aula</h1>
    <div id="clock"></div>
  </header>

  <div id="session-banner" onclick="startLogin()">
    <b>⚠️ Session udløbet</b> — <span id="banner-msg">Klik for at logge ind automatisk</span>
  </div>

  <div class="card">
    <h2>📬 Beskeder</h2>
    <div id="messages" class="loading">Henter...</div>
  </div>

  <div class="card">
    <h2>📅 Kalender</h2>
    <div id="calendar" class="loading">Henter...</div>
  </div>

  <script>
    let API_KEY = '';

    async function initConfig() {
      const res = await fetch('/api/config');
      const data = await res.json();
      API_KEY = data.api_key || '';
    }

    function apiFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: { ...(options.headers || {}), 'x-api-key': API_KEY }
      });
    }

    // Login via Playwright
    let loginPolling = null;

    async function startLogin() {
      const msg = document.getElementById('banner-msg');
      msg.textContent = 'Starter login...';
      try {
        await apiFetch('/api/login/start', { method: 'POST' });
        msg.textContent = '📱 Godkend i MitID-appen på din telefon...';
        pollLoginStatus();
      } catch(e) {
        msg.textContent = 'Fejl: ' + e.message;
      }
    }

    function pollLoginStatus() {
      clearInterval(loginPolling);
      loginPolling = setInterval(async () => {
        const res = await apiFetch('/api/login/status');
        const data = await res.json();
        const msg = document.getElementById('banner-msg');
        if (data.state === 'success') {
          clearInterval(loginPolling);
          msg.textContent = '✅ Login lykkedes! Genindlæser...';
          setTimeout(() => window.location.reload(), 1000);
        } else if (data.state === 'failed') {
          clearInterval(loginPolling);
          msg.textContent = '❌ ' + (data.error || 'Login fejlede') + ' — Klik for at prøve igen';
        }
      }, 3000);
    }

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('da-DK', {weekday:'long', day:'numeric', month:'long'}) +
        '  ' + now.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Session check
    async function checkSession() {
      const res = await apiFetch('/api/status');
      const data = await res.json();
      document.getElementById('session-banner').style.display = data.session_valid ? 'none' : 'block';
      return data.session_valid;
    }

    async function loadMessages() {
      const el = document.getElementById('messages');
      try {
        const res = await apiFetch('/api/messages');
        if (res.status === 401) { el.textContent = 'Session udløbet'; return; }
        const threads = await res.json();
        if (!threads.length) { el.textContent = 'Ingen beskeder'; return; }
        el.innerHTML = threads.slice(0, 8).map(t => `
          <div class="item ${t.read ? '' : 'unread'}">
            <div class="title">${t.subject || '(ingen emne)'}</div>
            <div class="meta">${t.read ? '✓ Læst' : '● Ulæst'}</div>
          </div>`).join('');
      } catch(e) { el.textContent = 'Fejl: ' + e.message; }
    }

    async function loadCalendar() {
      const el = document.getElementById('calendar');
      try {
        const profileRes = await apiFetch('/api/profile');
        if (profileRes.status === 401) { el.textContent = 'Session udløbet'; return; }
        const profile = await profileRes.json();
        const relations = profile?.data?.institutionProfile?.relations || [];
        const ids = relations.map(r => r.id).join(',');
        const res = await apiFetch('/api/calendar?inst_profile_ids=' + ids);
        const events = await res.json();
        if (!events.length) { el.textContent = 'Ingen begivenheder'; return; }
        el.innerHTML = events.slice(0, 8).map(e => `
          <div class="item">
            <div class="title">${e.title || e.summary || '(ingen titel)'}</div>
            <div class="meta">${e.startDateTime ? new Date(e.startDateTime).toLocaleString('da-DK', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) : ''}</div>
          </div>`).join('');
      } catch(e) { el.textContent = 'Fejl: ' + e.message; }
    }

    let pollTimer = null;
    let sessionWasExpired = false;

    async function loadAll() {
      await initConfig();
      const valid = await checkSession();
      if (valid) {
        if (sessionWasExpired) {
          window.location.reload();
          return;
        }
        loadMessages();
        loadCalendar();
        schedulePoll(5 * 60 * 1000);
      } else {
        sessionWasExpired = true;
        schedulePoll(10 * 1000);
      }
    }

    function schedulePoll(ms) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(loadAll, ms);
    }

    loadAll();
  </script>
</body>
</html>

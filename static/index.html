<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>Aula Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4f8;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      width: 1024px;
      height: 600px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #005fa8;
      border-radius: 10px;
      padding: 8px 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; color: #fff; font-weight: 700; }
    header #clock { font-size: 1rem; color: #cce4f7; }

    #session-banner {
      display: none;
      background: #d9534f;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      color: #fff;
      flex-shrink: 0;
      overflow: visible;
      height: auto;
      min-height: 44px;
    }
    #session-banner:hover { background: #c9302c; }

    .main {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .tab {
      padding: 6px 20px;
      border-radius: 8px;
      background: #fff;
      color: #005fa8;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      border: 2px solid #d0e4f0;
      transition: all 0.2s;
    }
    .tab.active {
      background: #005fa8;
      color: #fff;
      border-color: #005fa8;
    }

    /* Week view */
    .week-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      border: 1px solid #d0e4f0;
    }
    .week-card h2 {
      font-size: 0.85rem;
      color: #005fa8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .day-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #e8f0f7;
      align-items: start;
    }
    .day-row:last-child { border-bottom: none; }
    .day-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
      padding-top: 2px;
    }
    .day-row.today .day-name { color: #005fa8; }
    .day-row.today {
      background: #e8f4fc;
      border-radius: 6px;
      padding: 5px 6px;
      margin: 0 -6px;
    }
    .events { display: flex; flex-direction: column; gap: 3px; }
    .event {
      font-size: 0.8rem;
      background: #e8f4fc;
      border-left: 3px solid #0093d0;
      border-radius: 4px;
      padding: 3px 7px;
      display: flex;
      justify-content: space-between;
      color: #333;
    }
    .day-row.today .event {
      background: #cce4f7;
      border-left-color: #005fa8;
    }
    .event .time { color: #005fa8; font-size: 0.75rem; white-space: nowrap; margin-left: 8px; font-weight: 600; }
    .presence-tag {
      font-size: 0.75rem;
      background: #e8f4fc;
      border-left: 3px solid #0093d0;
      border-radius: 4px;
      padding: 2px 7px;
      color: #005fa8;
      margin-bottom: 3px;
    }
    .presence-tag.vacation {
      background: #fff3cd;
      border-left-color: #f59e0b;
      color: #92400e;
    }
    .day-row.today .presence-tag {
      background: #cce4f7;
      border-left-color: #005fa8;
    }

    /* Messages */
    .messages-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      overflow-y: auto;
      border: 1px solid #d0e4f0;
    }
    .messages-card h2 {
      font-size: 0.85rem;
      color: #005fa8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .msg-item {
      padding: 8px 0;
      border-bottom: 1px solid #e8f0f7;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .msg-item:hover { background: #f0f7ff; }
    .msg-item:last-child { border-bottom: none; }
    .msg-item .subject { font-weight: 600; color: #333; }
    .msg-item.unread .subject { color: #005fa8; }
    .msg-item.unread { border-left: 3px solid #005fa8; padding-left: 8px; }
    .msg-item .meta { color: #999; font-size: 0.75rem; margin-top: 3px; }
    .loading { color: #bbb; font-style: italic; font-size: 0.82rem; }
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .week-nav h2 { flex: 1; margin: 0; }
    .week-nav button {
      background: #e8f4fc; border: 1px solid #d0e4f0; border-radius: 6px;
      color: #005fa8; font-size: 1rem; cursor: pointer; padding: 2px 10px;
    }
    .week-nav button:hover { background: #cce4f7; }
    /* Message modal */
    #msg-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    #msg-modal-overlay.open { display: flex; }
    #msg-modal {
      background: #fff; border-radius: 12px; padding: 20px;
      width: 600px; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #msg-modal h2 { color: #005fa8; font-size: 1rem; margin-bottom: 8px; }
    #msg-modal .msg-body { font-size: 0.85rem; color: #333; line-height: 1.6; }
    #msg-modal .msg-meta { color: #999; font-size: 0.75rem; margin-bottom: 12px; }
    #msg-modal-close {
      float: right; background: none; border: none;
      font-size: 1.2rem; cursor: pointer; color: #999;
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 Aula</h1>
    <div id="clock"></div>
  </header>

  <div id="session-banner" onclick="startLogin()">
    <b>⚠️ Session udløbet</b> — <span id="banner-msg">Klik for at logge ind automatisk</span>
  </div>

  <div class="main">
    <div class="left">
      <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Aksel</div>
        <div class="tab" onclick="switchTab(1)">Max</div>
      </div>
      <div class="week-card">
        <div class="week-nav">
          <button onclick="changeWeek(-1)">◀</button>
          <h2>Uge <span id="week-nr"></span></h2>
          <button onclick="changeWeek(1)">▶</button>
        </div>
        <div id="week-content" class="loading">Henter...</div>
      </div>
    </div>
    <div class="messages-card">
      <h2>📬 Beskeder</h2>
      <div id="messages" class="loading">Henter...</div>
    </div>
  </div>

  <!-- Message modal -->
  <div id="msg-modal-overlay" onclick="closeMsgModal(event)">
    <div id="msg-modal">
      <button id="msg-modal-close" onclick="closeMsgModal()">✕</button>
      <h2 id="msg-modal-subject"></h2>
      <div class="msg-meta" id="msg-modal-meta"></div>
      <div class="msg-body" id="msg-modal-body"></div>
    </div>
  </div>

  <script>
    let API_KEY = '';
    const CHILDREN = [
      { name: 'Aksel', id: 5620584 },
      { name: 'Max',   id: 5620590 }
    ];
    let activeTab = 0;
    let weekOffset = 0;
    let allEvents = [];
    let presenceData = {};

    function changeWeek(delta) {
      weekOffset += delta;
      loadCalendar();
      loadPresence();
    }

    async function initConfig() {
      const res = await fetch('/api/config');
      const data = await res.json();
      API_KEY = data.api_key || '';
    }

    function apiFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: { ...(options.headers || {}), 'x-api-key': API_KEY }
      });
    }

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('da-DK', {weekday:'long', day:'numeric', month:'long'}) +
        '  ' + now.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Week helpers
    function getWeekDays() {
      const now = new Date();
      now.setDate(now.getDate() + weekOffset * 7);
      const day = now.getDay() || 7;
      const mon = new Date(now);
      mon.setDate(now.getDate() - day + 1);
      const days = [];
      for (let i = 0; i < 5; i++) {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function getWeekNr(date) {
      const d = new Date(date);
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      return 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
    }

    function isSameDay(a, b) {
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function switchTab(idx) {
      activeTab = idx;
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
      renderWeek();
    }

    function renderWeek() {
      const child = CHILDREN[activeTab];
      const days = getWeekDays();
      const today = new Date();
      document.getElementById('week-nr').textContent = getWeekNr(today);

      const content = document.getElementById('week-content');
      const dayNames = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag'];
      const childPresence = presenceData[child.id] || [];

      content.innerHTML = days.map((day, i) => {
        const isToday = isSameDay(day, today);
        const dateStr = day.toISOString().split('T')[0];

        // Calendar events
        const dayEvents = allEvents.filter(e => {
          if (!e.startDateTime) return false;
          const profiles = e.belongsToProfiles || [];
          if (!profiles.includes(child.id)) return false;
          return isSameDay(new Date(e.startDateTime), day);
        });

        // Presence template for this day
        const dayTemplate = childPresence.find(t => t.byDate === dateStr);
        let presenceHtml = '';
        if (dayTemplate) {
          if (dayTemplate.isOnVacation) {
            presenceHtml = `<div class="presence-tag vacation">🏖️ Ferie/fri</div>`;
          } else {
            const entry = dayTemplate.entryTime ? dayTemplate.entryTime.substring(0,5) : null;
            const exit = dayTemplate.exitTime ? dayTemplate.exitTime.substring(0,5) : null;
            const exitWith = dayTemplate.exitWith || '';
            presenceHtml = `<div class="presence-tag">🕐 ${entry || '?'} – ${exit || '?'}${exitWith ? ` · ${exitWith}` : ''}</div>`;
          }
        }

        const eventsHtml = dayEvents.length
          ? dayEvents.map(e => {
              const start = new Date(e.startDateTime);
              const end = e.endDateTime ? new Date(e.endDateTime) : null;
              const isAllDay = start.getHours()===0 && start.getMinutes()===0 && (!end || (end.getHours()===0 && end.getMinutes()===0));
              const timeStr = isAllDay ? '' : start.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'}) +
                (end ? '–' + end.toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'}) : '');
              return `<div class="event">
                <span>${e.title || '(ingen titel)'}</span>
                ${timeStr ? `<span class="time">${timeStr}</span>` : ''}
              </div>`;
            }).join('')
          : '';

        const noContent = !dayEvents.length && !presenceHtml;

        return `<div class="day-row ${isToday ? 'today' : ''}">
          <div class="day-name">${dayNames[i]}</div>
          <div class="events">
            ${presenceHtml}
            ${eventsHtml}
            ${noContent ? '<div class="no-events">Ingen aktiviteter</div>' : ''}
          </div>
        </div>`;
      }).join('');
    }

    // Login via Playwright
    let loginPolling = null;

    async function startLogin() {
      const msg = document.getElementById('banner-msg');
      msg.textContent = 'Starter login...';
      try {
        await apiFetch('/api/login/start', { method: 'POST' });
        msg.textContent = '📱 Godkend i MitID-appen på din telefon...';
        pollLoginStatus();
      } catch(e) {
        msg.textContent = 'Fejl: ' + e.message;
      }
    }

    function pollLoginStatus() {
      clearInterval(loginPolling);
      loginPolling = setInterval(async () => {
        const res = await apiFetch('/api/login/status');
        const data = await res.json();
        const banner = document.getElementById('session-banner');
        const msg = document.getElementById('banner-msg');
        if (data.state === 'show_qr') {
          banner.style.display = 'block';
          msg.innerHTML = '<b>📷 Scan QR-koden med din MitID-app</b><br/><img style="display:block;width:300px;margin-top:6px;border-radius:8px;border:2px solid #fff;" src="data:image/png;base64,' + data.qr_image + '"/>';
        } else if (data.state === 'success') {
          clearInterval(loginPolling);
          msg.textContent = '✅ Login lykkedes! Genindlæser...';
          setTimeout(() => window.location.reload(), 1000);
        } else if (data.state === 'failed') {
          clearInterval(loginPolling);
          msg.textContent = '❌ ' + (data.error || 'Login fejlede') + ' — Klik for at prøve igen';
        }
      }, 3000);
    }

    // Session check
    async function checkSession() {
      const res = await apiFetch('/api/status');
      const data = await res.json();
      document.getElementById('session-banner').style.display = data.session_valid ? 'none' : 'block';
      return data.session_valid;
    }

    async function loadCalendar() {
      const ids = CHILDREN.map(c => c.id).join(',');
      try {
        const res = await apiFetch('/api/calendar?inst_profile_ids=' + ids);
        if (res.status === 401) return;
        allEvents = await res.json();
        renderWeek();
      } catch(e) {
        document.getElementById('week-content').textContent = 'Fejl: ' + e.message;
      }
    }

    async function loadPresence() {
      const ids = CHILDREN.map(c => c.id).join(',');
      const days = getWeekDays();
      const from = days[0].toISOString().split('T')[0];
      const to = days[4].toISOString().split('T')[0];
      try {
        const res = await apiFetch(`/api/presence?inst_profile_ids=${ids}&from_date=${from}&to_date=${to}`);
        if (res.status !== 200) return;
        const templates = await res.json();
        presenceData = {};
        for (const t of templates) {
          presenceData[t.institutionProfile.id] = t.dayTemplates || [];
        }
        renderWeek();
      } catch(e) {
        console.error('Presence error:', e);
      }
    }

    async function loadMessages() {
      const el = document.getElementById('messages');
      try {
        const res = await apiFetch('/api/messages');
        if (res.status === 401) { el.textContent = 'Session udløbet'; return; }
        const threads = await res.json();
        if (!threads.length) { el.textContent = 'Ingen beskeder'; return; }
        el.innerHTML = threads.slice(0, 2).map(t => `
          <div class="msg-item ${t.read ? '' : 'unread'}" onclick="openMsg(${t.id}, '${(t.subject||'').replace(/'/g,"\\'")}')">
            <div class="subject">${t.subject || '(ingen emne)'}</div>
            <div class="meta">${t.read ? '✓ Læst' : '● Ulæst'}</div>
          </div>`).join('');
      } catch(e) { el.textContent = 'Fejl: ' + e.message; }
    }

    async function openMsg(threadId, subject) {
      document.getElementById('msg-modal-subject').textContent = subject;
      document.getElementById('msg-modal-body').textContent = 'Henter...';
      document.getElementById('msg-modal-meta').textContent = '';
      document.getElementById('msg-modal-overlay').classList.add('open');
      try {
        const res = await apiFetch(`/api/messages/${threadId}`);
        const data = await res.json();
        const messages = data.messages || [];
        if (!messages.length) {
          document.getElementById('msg-modal-body').textContent = 'Ingen indhold';
          return;
        }
        const first = messages.find(m => m.messageType === 'Message') || messages[0];
        const sender = first.sender?.fullName || 'Ukendt';
        const date = first.sendDateTime ? new Date(first.sendDateTime).toLocaleString('da-DK', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) : '';
        document.getElementById('msg-modal-meta').textContent = `${sender} · ${date}`;
        const body = first.text?.html || first.text || '(intet indhold)';
        document.getElementById('msg-modal-body').innerHTML = body;
      } catch(e) {
        document.getElementById('msg-modal-body').textContent = 'Fejl: ' + e.message;
      }
    }

    function closeMsgModal(e) {
      if (!e || e.target === document.getElementById('msg-modal-overlay') || e.target === document.getElementById('msg-modal-close')) {
        document.getElementById('msg-modal-overlay').classList.remove('open');
      }
    }

    let pollTimer = null;
    let sessionWasExpired = false;

    async function loadAll() {
      await initConfig();
      const valid = await checkSession();
      if (valid) {
        if (sessionWasExpired) { window.location.reload(); return; }
        loadCalendar();
        loadPresence();
        loadMessages();
        schedulePoll(5 * 60 * 1000);
      } else {
        sessionWasExpired = true;
        schedulePoll(10 * 1000);
      }
    }

    function schedulePoll(ms) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(loadAll, ms);
    }

    loadAll();
  </script>
</body>
</html>
